spring:
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
    static-path-pattern: /static/**
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ssafyhome?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ssafy
    password: ssafy
  jpa:
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        hbm2ddl:
          auto: create
app:
  cors:
    allowedOrigins:
      - http://localhost:3000
      - http://localhost:8080
      - http://localhost:5173
  auth:
    tokenSecret: SECRET_JWT_SECRET
    tokenExpirationMsec: 864000000
  oauth2:
    authorizedRedirectUris:
      - http://localhost:3000/oauth2/redirect
      - http://localhost:5173/oauth2/redirect
      - https://yaguhang.kro.kr:7443/oauth2/redirect
      - https://yaguhang.kro.kr:8443/oauth2/redirect
      - myandroidapp://oauth2/redirect
      - myiosapp://oauth2/redirect

logging:
  level:
    org.hibernate.SQL: debug
server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8
API:
