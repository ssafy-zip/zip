<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>아이디 찾기 안내</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:20px; background:#f4f4f4; }
        .box { background:#fff; padding:20px; border-radius:6px; max-width:500px; margin:0 auto; }
        .header { font-size:24px; color:#2563eb; margin-bottom:10px; }
        .userid { font-size:18px; font-weight:bold; background:#eef4ff; padding:10px; border-radius:4px; }
        .footer { margin-top:20px; font-size:12px; color:#777; text-align:center; }
    </style>
</head>
<body>
<div class="box">
    <div class="header">아이디 찾기 안내</div>
    <p>안녕하세요!</p>
    <p>요청하신 아이디는 다음과 같습니다:</p>
    <div class="userid" th:text="${userId}">USER_ID</div>
    <p>로그인하러 가시려면 아래 버튼을 클릭하세요.</p>
    <a th:href="@{'https://your-domain.com/login'}" style="display:inline-block;margin-top:10px;padding:10px 20px;background:#2563eb;color:#fff;text-decoration:none;border-radius:4px;">로그인하러 가기</a>
    <div class="footer">
        © 2025 Zip. 발신 전용 메일입니다.
    </div>
</div>
</body>
</html>
